session_name: Development
start_directory: /home/noel/Projects
# before_script: ./some/script/name
windows:
  - window_name: Dev
    focus: True
    layout: main-vertical
    options:
      main-pane-width: 150
      #    shell_command_before:
      #      - '[ -d .venv -a -f .venv/bin/activate ] && source .venv/bin/activate'
    panes:
      - shell_command:
          vim
        focus: true
      - pane
      - pane
  - window_name: Console
    panes:
        - pane
  - window_name: Notes
    panes:
        - shell_command:
            vimwiki
  - window_name: Misc
    layout: tiled
    shell_command_before:
        cd ~/
    panes:
      - pane
      - pane
      - pane
      - pane
